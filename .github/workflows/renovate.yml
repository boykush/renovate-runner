name: Renovate

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        type: choice
        default: info
        options:
          - info
          - debug
      dryRun:
        description: 'Dry run (do not create branches or PRs)'
        type: boolean
        default: false

# Never run two Renovate jobs at the same time; let an in-flight run finish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# The job authenticates to other repos with the GitHub App token, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # Renovate autodiscovers every boykush/* repository, so the token must
          # stay owner-wide. This single "all repositories" finding is knowingly
          # accepted: pinning to a repositories: list would defeat autodiscovery
          # of newly created repos. The permissions below are still scoped down.
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          # Scope the token to only the permissions Renovate needs instead of
          # inheriting every permission the App was granted at installation.
          permission-contents: write # create branches and commits
          permission-pull-requests: write # open and update pull requests
          permission-issues: write # maintain the dependency dashboard issue
          permission-workflows: write # update pinned action SHAs in workflows

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Only config.js is needed here; Renovate uses the App token for all git
          # operations, so the checkout's git credential should not be persisted.
          persist-credentials: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: config.js
          token: ${{ steps.app-token.outputs.token }}
          # Pin to the last release before a regression broke onboarding PR creation.
          # 43.232.1 (renovatebot/renovate#44098) moved `productLinks` to global-only
          # config, but the onboarding PR template still reads `config.productLinks`,
          # so every onboarding run crashes with:
          #   "Cannot read properties of undefined (reading 'homepage')"
          # Remove this pin once an upstream fix is released.
          renovate-version: 43.232.0
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # Empty string is treated as "unset" by Renovate, so scheduled runs are live.
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
