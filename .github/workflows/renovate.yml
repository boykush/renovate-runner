name: Renovate

on:
  schedule:
    # Every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Renovate log level'
        type: choice
        default: info
        options:
          - info
          - debug
      dryRun:
        description: 'Dry run (do not create branches or PRs)'
        type: boolean
        default: false

# Never run two Renovate jobs at the same time; let an in-flight run finish.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# The job authenticates to other repos with the GitHub App token, not GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        # Renovate autodiscovers and updates every boykush/* repository, so this
        # runner intentionally provisions an owner-wide token with broad
        # installation permissions. That breadth is by design, not a misconfig.
        # zizmor: ignore[github-app]
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # Scope the token to every repository the App can access under this owner.
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Only config.js is needed here; Renovate uses the App token for all git
          # operations, so the checkout's git credential should not be persisted.
          persist-credentials: false

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          configurationFile: config.js
          token: ${{ steps.app-token.outputs.token }}
          # Pin to the last release before a regression broke onboarding PR creation.
          # 43.232.1 (renovatebot/renovate#44098) moved `productLinks` to global-only
          # config, but the onboarding PR template still reads `config.productLinks`,
          # so every onboarding run crashes with:
          #   "Cannot read properties of undefined (reading 'homepage')"
          # Remove this pin once an upstream fix is released.
          renovate-version: 43.232.0
        env:
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # Empty string is treated as "unset" by Renovate, so scheduled runs are live.
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
